<html>
    <head>
        <title>Crypto Clicker by WifiRouter</title>
        <link type="text/css" rel="stylesheet" href="style.css">

    </head>
    <body id="body">
        <div class="content" id="content">
            <p>Mining: <strong>Bitcoin ₿</strong></p>
            <p>Idle speed: <strong>0.00/s</strong></p>
            <div class="inline">
                <p>Balance: </p>
            </div>
            <div class="inline">
                <strong><p id="balance">0</p></strong>
            </div>
            <div class="inline" >
                <strong><p id="currency">₿</p></strong>
            </div>
            <div class="button-array">
                <div class="inline">
                    <button id="click" onclick="clicked()">Click (+1)</button>
                </div>
                <div class="inline">
                    <button>Upgrade</button>
                </div>
                <div class="inline">
                    <button>Save</button>
                </div>
                <div class="inline">
                    <button>Load</button>
                </div>
                <div class="inline">
                    <input type="checkbox" id="darkmode">Dark Mode</input>
                </div>
            </div>
        </div>

        <script src="game.js"></script>
    </body>
</html>
